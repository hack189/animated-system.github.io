<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Top 5 World Headlines</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <header>
    <h1>Top 5 News Headlines — Around the World</h1>
    <p class="subtitle">Live headlines aggregated from international news sources (client-side RSS).</p>
  </header>

  <main>
    <section id="headlines" class="grid">

    <small>Sources: BBC, Reuters, CNN, Al Jazeera, NYTimes. Fetched client-side with a public CORS proxy.</small>
  </footer>

  <script src="/assets/script.js"></script>
</body>
</html>
